services:
  gateway-service:
    build:
      context: ./python_microservices_stack
      dockerfile: python_microservices/Dockerfile.service
      args:
        SERVICE_APP: python_microservices.services.gateway_service.app
    ports:
      - "8082:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
      - SIMULATION_SERVICE_URL=http://simulation-service:8000
      - CONFIG_SERVICE_URL=http://config-service:8000
      - ADMIN_SERVICE_URL=http://admin-service:8000
      - FRONTEND_URL=http://frontend:80
    depends_on:
      - frontend
      - auth-service
      - simulation-service
      - config-service
      - admin-service
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    expose:
      - "80"
    restart: unless-stopped

  auth-service:
    build:
      context: ./python_microservices_stack
      dockerfile: python_microservices/Dockerfile.service
      args:
        SERVICE_APP: python_microservices.services.auth_service.app
    expose:
      - "8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - WEATHER_CITY=${WEATHER_CITY:-Moscow}
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  simulation-service:
    build:
      context: ./python_microservices_stack
      dockerfile: python_microservices/Dockerfile.service
      args:
        SERVICE_APP: python_microservices.services.simulation_service.app
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  config-service:
    build:
      context: ./python_microservices_stack
      dockerfile: python_microservices/Dockerfile.service
      args:
        SERVICE_APP: python_microservices.services.config_service.app
    expose:
      - "8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  admin-service:
    build:
      context: ./python_microservices_stack
      dockerfile: python_microservices/Dockerfile.service
      args:
        SERVICE_APP: python_microservices.services.admin_service.app
    expose:
      - "8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
