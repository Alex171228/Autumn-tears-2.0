services:
  legacy-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.legacy
    ports:
      - "8080:80"
    depends_on:
      - legacy-backend
    restart: unless-stopped

  legacy-backend:
    build:
      context: .
      dockerfile: Dockerfile.legacy
    expose:
      - "8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - WEATHER_CITY=${WEATHER_CITY:-Moscow}
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - legacy_mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - legacy_redis_data:/data
    restart: unless-stopped

volumes:
  legacy_mongo_data:
  legacy_redis_data:
